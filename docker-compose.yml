services:
  postgres:
    image: postgres:18-alpine
    container_name: poe2-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: demo_user
      POSTGRES_PASSWORD: demo_password
      POSTGRES_DB: poe2_party_finder
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo_user -d poe2_party_finder"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
